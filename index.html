<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f4f7f6"> <title>문장 암기장</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="문장 암기장">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">

<style>
  body, button, input, textarea, .card {
    font-family: 'Nanum Gothic', sans-serif;
    touch-action: manipulation; 
  }

  body {
    background-color: #f4f7f6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
  }
  
  .top-right {
    position: absolute;
    top: 20px;
    right: 20px;
  }
  .top-left {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap; 
    max-width: 70%;
  }

  .btn-top {
    padding: 10px 12px;
    color: #333;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.2s, background-color 0.2s;
    font-size: 13px;
  }
  .btn-top:hover { transform: translateY(-2px); }
  .btn-master { background-color: #f1c40f; }
  .btn-all { background-color: #3498db; color: white; }
  .btn-all:hover { background-color: #2980b9; }

  h1 {
    color: #333;
    margin-bottom: 15px;
    font-size: 28px;
    text-align: center;
  }
  
  .deck-header-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
  }

  .btn-deck-nav {
    background: none;
    border: none;
    font-size: 18px;
    color: #8e44ad;
    cursor: pointer;
    padding: 5px 10px;
    border-radius: 50%;
    transition: background 0.2s, transform 0.2s;
  }
  .btn-deck-nav:hover { background: #f0e6f6; transform: scale(1.1); }
  .btn-deck-nav:active { transform: scale(0.9); }

  .card-container {
    perspective: 1000px;
    width: 360px;
    height: 420px; 
    margin-bottom: 15px;
    transition: all 0.5s ease;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  
  .card-hidden-anim {
    opacity: 0.35 !important;
    transform: scale(0.85) !important;
    filter: grayscale(100%);
  }

  .fly-away {
    opacity: 0;
    transform: translateY(-50px) scale(0.9) !important;
    pointer-events: none;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transition: transform 0.6s;
    transform-style: preserve-3d;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    padding: 30px 25px; 
    box-sizing: border-box;
    overflow-y: auto;
  }
  
  .card-front {
    background-color: #ffffff;
    color: #2c3e50;
    border: 1px solid #e0e0e0;
  }
  
  .card-back {
    background-color: #eafaf1; 
    color: #333333;           
    transform: rotateY(180deg);
    border: 1px solid #d1f2eb;
  }
  
  #front-display, #text-display {
    width: 100%;
    display: inline-block;
    white-space: pre-wrap; 
    word-break: break-word;
    font-size: 17px; 
    font-weight: bold;
    line-height: 1.6; 
    text-align: left; 
  }

  .flashcard-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 14px;
    white-space: normal; 
    background-color: white;
  }
  .flashcard-table th, .flashcard-table td {
    border: 1px solid #bdc3c7;
    padding: 8px 10px;
    text-align: left;
    word-break: keep-all;
  }
  .flashcard-table th {
    background-color: #f1f2f6;
    font-weight: 800;
    color: #2c3e50;
    text-align: center;
  }

  .inline-cloze {
    display: inline-block;
    background-color: #f1f2f6;
    border: 2px dashed #bdc3c7;
    border-radius: 8px;
    padding: 2px 10px;
    margin: 2px 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9em;
    vertical-align: middle;
    word-break: keep-all;
  }
  .inline-cloze:active { transform: scale(0.95); }
  .inline-cloze.revealed { border-color: #3498db; background-color: #ebf5fb; color: #3498db; border-style: solid; }
  .inline-cloze .cloze-real { display: none; }
  .inline-cloze.revealed .cloze-placeholder { display: none; }
  .inline-cloze.revealed .cloze-real { display: inline; font-weight: bold; }

  .btn-hint {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    z-index: 10;
    transition: transform 0.2s, opacity 0.2s;
    padding: 5px;
  }
  .btn-hint:hover { transform: scale(1.2); }

  .hint-toast {
    position: absolute;
    bottom: 60px;
    left: 20px;
    background: rgba(44, 62, 80, 0.9);
    color: white;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 11;
    opacity: 0;
    visibility: hidden;
    transform: translateY(10px);
    transition: all 0.3s ease;
    max-width: 70%;
    word-break: break-word;
    text-align: left;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .hint-toast.show { opacity: 1; visibility: visible; transform: translateY(0); }

  .card.flipped .btn-hint,
  .card.flipped .hint-toast {
    opacity: 0 !important; pointer-events: none; visibility: hidden !important;
  }

  .progress-container {
    width: 340px; display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; color: #7f8c8d; font-size: 14px;
  }
  .progress-bar-bg { width: 100%; height: 6px; background-color: #e0e0e0; border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .progress-bar-fill { height: 100%; background-color: #2ecc71; width: 0%; transition: width 0.3s ease; }
  
  .controls { display: flex; gap: 8px; margin-bottom: 20px; align-items: stretch; width: 340px; }
  .btn-nav {
    padding: 12px 18px; font-size: 15px; font-weight: bold; border: none; border-radius: 12px; background-color: #34495e; color: white; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  .btn-nav:hover { background-color: #2c3e50; }
  .btn-correct { background-color: #27ae60; flex: 1; }
  .btn-correct:hover { background-color: #219653; }
  .btn-undo { background-color: #e67e22; }
  .btn-undo:hover { background-color: #d35400; }
  
  .btn-nav:disabled, .btn-correct:disabled, .btn-undo:disabled {
    background-color: #bdc3c7 !important; color: white !important; cursor: not-allowed; box-shadow: none; transform: none; border-color: transparent !important;
  }

  .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 100; display: flex; flex-direction: column-reverse; align-items: flex-end; gap: 15px; pointer-events: none; }
  .fab-menu { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; opacity: 0; visibility: hidden; transform: translateY(20px); transition: all 0.3s ease; pointer-events: none; }
  .fab-menu.open { opacity: 1; visibility: visible; transform: translateY(0); pointer-events: auto; }
  .fab-item { background-color: white; color: #333; border: none; padding: 12px 18px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-weight: bold; font-size: 14px; cursor: pointer; transition: transform 0.2s, background-color 0.2s; pointer-events: auto; }
  .fab-item:hover { transform: scale(1.05); background-color: #f8f9f9; }
  .fab { width: 60px; height: 60px; border-radius: 50%; background-color: #e74c3c; color: white; font-size: 32px; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4); transition: transform 0.3s, background-color 0.3s; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
  .fab.open { transform: rotate(45deg); background-color: #c0392b; }

  .deck-fab-container {
    position: fixed; bottom: 30px; left: 30px; z-index: 100; display: flex; flex-direction: column-reverse; align-items: flex-start; gap: 15px;
  }
  .btn-deck-fab {
    background-color: #8e44ad; color: white; border: none; padding: 15px 20px; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-weight: bold; font-size: 15px; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .btn-deck-fab:hover { transform: scale(1.05); background-color: #9b59b6; }

  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 200; pointer-events: auto; }
  .modal-content { 
    background-color: white; 
    padding: 20px;
    border-radius: 20px; 
    width: 90%; 
    max-width: 420px; 
    max-height: 90vh; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    overflow-y: auto; 
  }
  .modal-content h2 { margin: 0; font-size: 20px; color: #333; text-align: center; }
  .modal-content textarea, .modal-content input[type="text"] { padding: 10px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; resize: vertical; font-family: inherit; }
  .modal-content textarea:focus, .modal-content input[type="text"]:focus { border-color: #2ecc71; }
  
  .btn-wrap {
    flex: 1; padding: 8px; font-size: 13px; font-weight: bold; border: 1px solid #bdc3c7; border-radius: 8px; background-color: #f8f9f9; color: #2c3e50; cursor: pointer; transition: background 0.2s;
  }
  .btn-wrap:hover { background-color: #e5e8e8; }
  
  .btn-wrap-table { background-color: #e8f8f5; border-color: #1abc9c; color: #16a085; }
  .btn-wrap-table:hover { background-color: #d1f2eb; }

  .modal-buttons { display: flex; gap: 8px; margin-top: 5px; flex-shrink: 0; }
  .modal-buttons button { flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; }
  .btn-cancel { background-color: #bdc3c7; color: white; }
  .btn-submit { background-color: #2ecc71; color: white; }
  .btn-delete { background-color: #e74c3c; color: white; display: none; }
  .btn-delete:hover { background-color: #c0392b; }

  .mastered-list { overflow-y: auto; max-height: 300px; margin-top: 10px; }
  .mastered-item { padding: 12px; background-color: #f9f9f9; border-bottom: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; font-weight: bold; color: #f39c12; display: flex; justify-content: space-between; cursor: pointer; transition: background-color 0.2s; align-items: center;}
  .mastered-item:hover { background-color: #eef2f5; }

  .deck-order-btns { display: flex; flex-direction: column; gap: 4px; margin-left: 10px; }
  .btn-order { background: #e0e0e0; border: none; border-radius: 4px; padding: 4px 6px; font-size: 10px; cursor: pointer; color: #333; transition: background 0.2s; }
  .btn-order:hover { background: #bdc3c7; }

  #search-input {
    width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 10px;
    box-sizing: border-box; outline: none; font-size: 14px; background-color: #f8f9f9;
    transition: border-color 0.2s;
  }
  #search-input:focus { border-color: #3498db; }
  
  #view-modal { z-index: 300; }
  #form-modal { z-index: 400; }
  #deck-modal { z-index: 500; }
  #file-input { display: none; }
</style>
</head>
<body>

<div class="top-left">
  <button class="btn-top btn-all" onclick="openAllListModal()">📚 전체 목록</button>
  <input type="file" id="file-input" accept=".json" onchange="handleFileUpload(event)">
</div>

<div class="top-right">
  <button class="btn-top btn-master" onclick="openMasteredModal()">🏆 마스터 목록</button>
</div>

<h1 id="main-title">
  📖 문장 암기장
  <div class="deck-header-controls">
    <button class="btn-deck-nav" onclick="prevDeck()">◀</button>
    <span style="font-size: 16px; color: #8e44ad; min-width: 90px;" id="deck-title-badge">[기본]</span>
    <button class="btn-deck-nav" onclick="nextDeck()">▶</button>
  </div>
</h1>

<div class="card-container" id="card-container">
  <div class="card" id="flashcard">
    <div class="card-face card-front" id="card-front">
      <div id="front-display">..</div>
      <button class="btn-hint" id="btn-hint" onclick="showHint(event)" style="display: none;">💡</button>
      <div class="hint-toast" id="hint-toast"></div>
    </div>
    <div class="card-face card-back" id="card-back">
      <div id="text-display">..</div>
    </div>
  </div>
</div>

<div class="progress-container">
  <div id="progress-text">0 / 0</div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-bar-fill"></div>
  </div>
</div>

<div class="controls">
  <button class="btn-nav" id="btn-prev" onclick="prevCard()">◀</button>
  <button class="btn-nav btn-correct" id="btn-correct" onclick="markCorrect()" disabled>✔ 정답 (0/5)</button>
  <button class="btn-nav" id="btn-next" onclick="nextCard()" disabled>▶</button>
</div>

<div class="deck-fab-container">
  <button class="btn-deck-fab" onclick="openDeckModal()">🗂️ 태그</button>
</div>

<div class="fab-container">
  <button class="fab" id="main-fab" onclick="toggleFabMenu()">+</button>
  <div class="fab-menu" id="fab-menu">
    <button class="fab-item" onclick="downloadBackup(); toggleFabMenu()">💾 백업</button>
    <button class="fab-item" onclick="triggerUpload(); toggleFabMenu()">📂 불러오기</button>
    <button class="fab-item" onclick="openFormModal('add'); toggleFabMenu()">✏️ 문장 추가</button>
  </div>
</div>

<div class="modal-overlay" id="deck-modal">
  <div class="modal-content">
    <h2>🗂️ 덱 선택 및 순서 변경</h2>
    <p style="margin:0; font-size:12px; color:#7f8c8d; text-align:center;">우측 화살표로 덱 순서를 바꿀 수 있어!</p>
    <div id="deck-list" class="mastered-list"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" style="width: 100%;" onclick="closeDeckModal()">닫기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="form-modal">
  <div class="modal-content">
    <h2 id="modal-title">새 문장 추가하기</h2>
    <div style="font-size: 12px; color: #e67e22; background: #fdf2e9; padding: 8px; border-radius: 6px; margin-bottom: 2px;">
      <b>💡 스마트 빈칸 기능</b><br>문제에 <code>[[빈칸내용]]</code> 을 쓰면 빈칸 문제가 만들어져!
    </div>
    
    <input type="text" id="new-tag" placeholder="🏷️ 태그 (예: 2026기출) - 비워두면 '기본'">

    <div style="display: flex; gap: 8px; margin-bottom: 2px;">
      <button type="button" class="btn-wrap" onmousedown="event.preventDefault()" onclick="wrapText('[[', ']]')">[[ 빈칸 만들기 ]]</button>
      <button type="button" class="btn-wrap btn-wrap-table" onmousedown="event.preventDefault()" onclick="insertTableTemplate()">📊 표 넣기</button>
    </div>

    <textarea id="new-name" rows="5" placeholder="문제 예: [[6]]㎟ 이상의 특고압 접지도체"></textarea>
    <textarea id="new-hint" rows="2" placeholder="힌트 (선택사항)"></textarea>
    <textarea id="new-content" rows="4" placeholder="정답/추가 설명 (여기에 표를 넣어도 좋아!)"></textarea>
    
    <div style="display: flex; align-items: center; gap: 8px; margin-top: 5px;">
      <input type="checkbox" id="new-hidden" style="width: auto; cursor: pointer;">
      <label for="new-hidden" style="font-size: 14px; color: #7f8c8d; cursor: pointer;">이 카드를 당분간 학습에서 숨기기</label>
    </div>

    <div class="modal-buttons">
      <button class="btn-cancel" onclick="closeFormModal()">취소</button>
      <button class="btn-delete" id="modal-delete-btn" onclick="deleteCard()">삭제</button>
      <button class="btn-submit" id="modal-submit-btn" onclick="submitCard()">추가하기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="mastered-modal">
  <div class="modal-content">
    <h2>🏆 마스터한 문장</h2>
    <p style="margin:0; font-size:12px; color:#7f8c8d; text-align:center;">현재 덱에서 마스터한 카드만 보여!</p>
    <div id="mastered-list" class="mastered-list"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" style="width: 100%;" onclick="closeMasteredModal()">닫기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="all-list-modal">
  <div class="modal-content">
    <h2>📚 전체 카드 목록</h2>
    <p style="margin:0; font-size:12px; color:#7f8c8d; text-align:center;">총 <span id="all-count">0</span>개의 카드가 있어!</p>
    <input type="text" id="search-input" placeholder="🔍 문제 또는 정답 검색..." oninput="filterAllList()">
    <div id="all-list" class="mastered-list"></div>
    <div class="modal-buttons">
      <button class="btn-cancel" style="width: 100%;" onclick="closeAllListModal()">닫기</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="view-modal">
  <div class="modal-content" style="align-items: center;">
    <h2 id="view-name" style="color: #2c3e50; text-align: left; white-space: pre-wrap; word-break: break-word; font-size: 16px; width: 100%; line-height: 1.5;">문제</h2>
    <div id="view-hint" style="color: #e67e22; font-size: 14px; font-weight: bold; width: 100%; text-align: left; display: none;">💡 힌트: </div>
    <hr style="width: 100%; border: 0; border-top: 1px dashed #ccc; margin: 15px 0;">
    <div id="view-content" style="margin-bottom: 20px; font-size: 16px; color: #333333; text-align: left; white-space: pre-wrap; word-break: break-word; width: 100%; line-height: 1.5;">정답 내용</div>
    <div class="modal-buttons" style="width: 100%;">
      <button class="btn-cancel" style="flex: 1;" onclick="closeViewModal()">닫기</button>
      <button id="view-btn-hide" style="flex: 1; padding: 12px; font-size: 15px; font-weight: bold; border: 2px solid #bdc3c7; border-radius: 10px; cursor: pointer; background: white; color: #7f8c8d; transition: all 0.2s;" onclick="toggleHideViewed()">🫥 숨김</button>
      <button class="btn-submit" style="flex: 1;" onclick="editViewedCard()">편집</button>
    </div>
  </div>
</div>

<script>
  let deckCycles = {}; 
  let activeCards = [];
  let masteredCards = [];
  let shuffledDeck = [];
  let currentIndex = 0;
  let currentDeckTag = ""; 
  let deckOrder = []; 

  let currentEditTarget = null;
  let currentViewTarget = null;
  let currentMode = 'add';
  let hintTimer = null; 

  const cardContainer = document.getElementById('card-container');
  const card = document.getElementById('flashcard');
  const frontDisplay = document.getElementById('front-display');
  const textDisplay = document.getElementById('text-display');
  const progressText = document.getElementById('progress-text');
  const progressBarFill = document.getElementById('progress-bar-fill');
  
  const btnPrev = document.getElementById('btn-prev');
  const btnCorrect = document.getElementById('btn-correct');
  const btnNext = document.getElementById('btn-next');

  function getAvailableDecks() {
    let allTags = [...new Set([...activeCards, ...masteredCards].map(c => c.tag || ""))];
    if(allTags.length === 0) allTags = [""];
    
    let ordered = deckOrder.filter(t => allTags.includes(t));
    let newTags = allTags.filter(t => !ordered.includes(t)).sort();
    
    deckOrder = [...ordered, ...newTags];
    return deckOrder;
  }

  function updateMainTitle() {
    let titleName = currentDeckTag === "" ? '기본' : currentDeckTag;
    document.getElementById('deck-title-badge').innerText = `[${titleName}]`;
  }

  function prevDeck() {
    let decks = getAvailableDecks();
    if(decks.length <= 1) return;
    let idx = decks.indexOf(currentDeckTag);
    let nextTag = idx > 0 ? decks[idx - 1] : decks[decks.length - 1];
    switchDeck(nextTag);
  }

  function nextDeck() {
    let decks = getAvailableDecks();
    if(decks.length <= 1) return;
    let idx = decks.indexOf(currentDeckTag);
    let nextTag = idx < decks.length - 1 ? decks[idx + 1] : decks[0];
    switchDeck(nextTag);
  }

  function switchDeck(tag) {
    currentDeckTag = tag;
    shuffledDeck = [];
    saveData();
    updateMainTitle();
    resetDeck();
    updateUI();
  }

  function moveDeckUp(tag, event) {
    event.stopPropagation();
    let idx = deckOrder.indexOf(tag);
    if (idx > 0) {
      [deckOrder[idx - 1], deckOrder[idx]] = [deckOrder[idx], deckOrder[idx - 1]];
      saveData();
      openDeckModal(); 
    }
  }

  function moveDeckDown(tag, event) {
    event.stopPropagation();
    let idx = deckOrder.indexOf(tag);
    if (idx < deckOrder.length - 1 && idx !== -1) {
      [deckOrder[idx + 1], deckOrder[idx]] = [deckOrder[idx], deckOrder[idx + 1]];
      saveData();
      openDeckModal(); 
    }
  }

  function insertTableTemplate() {
    const textarea = document.getElementById('new-content');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const text = textarea.value;
    const template = "\n| 제목1 | 제목2 |\n|---|---|\n| 내용1 | 내용2 |\n| 내용3 | 내용4 |\n";
    
    textarea.value = text.substring(0, start) + template + text.substring(end);
    textarea.focus();
    textarea.selectionStart = start + template.length;
    textarea.selectionEnd = start + template.length;
  }

  function wrapText(open, close) {
    const textarea = document.getElementById('new-name');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    const text = textarea.value;
    const selected = text.substring(start, end);
    
    textarea.value = text.substring(0, start) + open + selected + close + text.substring(end);
    textarea.focus();
    textarea.selectionStart = start + open.length;
    textarea.selectionEnd = end + open.length;
  }

  function handleClozeClick(event, element) {
    event.stopPropagation(); 
    if (!element.classList.contains('revealed')) {
      element.classList.add('revealed');
      
      let currentCard = shuffledDeck.length > 0 ? shuffledDeck[currentIndex] : null;
      if (!currentCard) return;
      
      const unrevealed = document.querySelectorAll('#front-display .inline-cloze:not(.revealed)');
      if (unrevealed.length === 0 && !currentCard.isCorrectInCurrentCycle) {
        document.getElementById('btn-correct').disabled = false;
      }
    }
  }

  function formatText(text, isCloze = false) {
    if (!text) return { formatted: "", answers: [] };
    let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    let answers = [];

    if (isCloze) {
      safeText = safeText.replace(/\[\[(.*?)\]\]/g, (m, p1) => { 
          answers.push(p1); 
          return `<span class="inline-cloze" onclick="handleClozeClick(event, this)"><span class="cloze-placeholder">👀 터치</span><span class="cloze-real">${p1}</span></span>`; 
      });
    }

    const lines = safeText.split('\n');
    let inTable = false;
    let result = [];
    
    for (let i = 0; i < lines.length; i++) {
      let line = lines[i].trim();
      if (line.startsWith('|') && line.endsWith('|')) {
        if (!inTable) {
          result.push('<table class="flashcard-table">');
          inTable = true;
        }
        if (line.match(/^\|(?:-+|:-+:?|-+:|:-+)(\|(?:-+|:-+:?|-+:|:-+))*\|$/)) continue; 
        
        let cells = line.split('|').slice(1, -1);
        let isHeader = (i + 1 < lines.length && lines[i+1].trim().match(/^\|(?:-+|:-+:?|-+:|:-+)(\|(?:-+|:-+:?|-+:|:-+))*\|$/));
        
        result.push('<tr>');
        cells.forEach(cell => {
          let tag = isHeader ? 'th' : 'td';
          result.push(`<${tag}>${cell.trim()}</${tag}>`);
        });
        result.push('</tr>');
      } else {
        if (inTable) {
          result.push('</table>');
          inTable = false;
        }
        result.push(lines[i]); 
      }
    }
    if (inTable) result.push('</table>');

    return { formatted: result.join('\n'), answers: answers };
  }

  function getCardType(text) {
    if(/\[\[.*?\]\]/.test(text)) return 'cloze';
    return 'normal';
  }

  function upgradeCardData(card) {
    card.type = getCardType(card.name);
    card.hint = card.hint || "";
    card.tag = card.tag || ""; 
    
    let currentCycle = deckCycles[card.tag] || 0;
    card.lastUpdatedCycle = card.lastUpdatedCycle !== undefined ? card.lastUpdatedCycle : currentCycle;
    card.masteredAtCycle = card.masteredAtCycle !== undefined ? card.masteredAtCycle : currentCycle;
    card.isHidden = card.isHidden || false;
    card.isCorrectInCurrentCycle = card.isCorrectInCurrentCycle || false;

    // 예전 데이터 정리
    card.correctCount = card.correctCount !== undefined ? card.correctCount : 0;
    if (card.correctCountA !== undefined || card.correctCountB !== undefined) {
        card.correctCount = Math.max(card.correctCountA || 0, card.correctCountB || 0);
        delete card.correctCountA;
        delete card.correctCountB;
        delete card.nextMode;
        delete card.lastAnsweredMode;
    }

    return card;
  }

  function toggleFabMenu() {
    const menu = document.getElementById('fab-menu');
    const fab = document.getElementById('main-fab');
    menu.classList.toggle('open');
    fab.classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const container = document.querySelector('.fab-container');
    const menu = document.getElementById('fab-menu');
    const fab = document.getElementById('main-fab');
    if (!container.contains(e.target) && menu.classList.contains('open')) {
      menu.classList.remove('open');
      fab.classList.remove('open');
    }
  });

  function saveData() {
    const data = { activeCards, masteredCards, deckCycles, shuffledDeck, currentIndex, currentDeckTag, deckOrder };
    try {
      localStorage.setItem('sentenceApp_data', JSON.stringify(data));
    } catch (e) {
      console.error("데이터 저장 실패:", e);
      alert("⚠️ 저장 공간이 부족하거나 오류가 발생해서 데이터를 저장하지 못했어!");
    }
  }

  function loadSavedData() {
    const saved = localStorage.getItem('sentenceApp_data');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        currentDeckTag = data.currentDeckTag || "";
        deckOrder = data.deckOrder || [];
        
        deckCycles = data.deckCycles || {};
        if (data.deckCycleCount !== undefined) {
           deckCycles[currentDeckTag] = data.deckCycleCount;
        }

        activeCards = data.activeCards.map(upgradeCardData);
        masteredCards = data.masteredCards.map(upgradeCardData) || [];
        
        getAvailableDecks();

        if (data.shuffledDeck && data.shuffledDeck.length > 0) {
          shuffledDeck = data.shuffledDeck.map(savedCard =>
            activeCards.find(f => f.name === savedCard.name) || masteredCards.find(f => f.name === savedCard.name)
          ).filter(Boolean);
          currentIndex = data.currentIndex || 0;
        } else {
          shuffledDeck = []; currentIndex = 0;
        }
      } catch (e) { initDefaultData(); }
    } else { initDefaultData(); }
    updateMainTitle();
  }

  function initDefaultData() {
    activeCards = []; masteredCards = []; deckCycles = {}; shuffledDeck = []; currentIndex = 0; currentDeckTag = ""; deckOrder = [""];
  }

  function downloadBackup() {
    const data = { activeCards, masteredCards, deckCycles, currentDeckTag, deckOrder };
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "sentences_backup.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
  }

  function triggerUpload() { document.getElementById('file-input').click(); }

  function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (data.activeCards && Array.isArray(data.masteredCards)) {
          currentDeckTag = data.currentDeckTag || "";
          deckOrder = data.deckOrder || [];
          
          deckCycles = data.deckCycles || {};
          if (data.deckCycleCount !== undefined) {
             deckCycles[currentDeckTag] = data.deckCycleCount;
          }

          activeCards = data.activeCards.map(upgradeCardData);
          masteredCards = data.masteredCards.map(upgradeCardData);
          
          getAvailableDecks(); 
          updateMainTitle();
          resetDeck(); updateUI();
          alert("데이터를 성공적으로 불러왔어!");
        } else { alert("파일 형식이 맞지 않아!"); }
      } catch(err) { alert("파일을 읽는 중 오류가 발생했어."); }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  let pressTimer; let isLongPress = false; let startX = null; let startY = null;

  cardContainer.addEventListener('mousedown', startPress);
  cardContainer.addEventListener('touchstart', startPress, {passive: true});
  cardContainer.addEventListener('mousemove', movePress);
  cardContainer.addEventListener('touchmove', movePress, {passive: true});
  cardContainer.addEventListener('mouseup', endPress);
  cardContainer.addEventListener('mouseleave', endPress);
  cardContainer.addEventListener('touchend', endPress);
  
  cardContainer.addEventListener('click', (e) => {
    if (e.target.id === 'btn-hint') return;
    if (!isLongPress) flipCard();
  });

  function startPress(e) {
    if (e.target.id === 'btn-hint' || e.target.closest('.inline-cloze')) return;
    if (shuffledDeck.length === 0) return;
    isLongPress = false;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startX = clientX; startY = clientY;

    pressTimer = setTimeout(() => {
      isLongPress = true;
      if (navigator.vibrate) navigator.vibrate(50);
      openFormModal('edit'); 
    }, 600);
  }

  function movePress(e) {
    if (!startX || !startY) return;
    let clientX = e.touches ? e.touches[0].clientX : e.clientX;
    let clientY = e.touches ? e.touches[0].clientY : e.clientY;
    if (Math.abs(clientX - startX) > 10 || Math.abs(clientY - startY) > 10) clearTimeout(pressTimer);
  }

  function endPress(e) { clearTimeout(pressTimer); startX = null; startY = null; }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function showHint(event) {
    event.stopPropagation(); 
    const hintToast = document.getElementById('hint-toast');
    const currentCard = shuffledDeck[currentIndex];
    
    if(hintToast.classList.contains('show')) {
        hintToast.classList.remove('show');
        clearTimeout(hintTimer);
        return;
    }
    if (currentCard && currentCard.hint) {
      hintToast.innerText = "💡 " + currentCard.hint;
      hintToast.classList.add('show');
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => { hintToast.classList.remove('show'); }, 3000);
    }
  }

  function resetDeck() {
    if (!deckCycles[currentDeckTag]) deckCycles[currentDeckTag] = 0;
    deckCycles[currentDeckTag]++;
    let currentCycle = deckCycles[currentDeckTag];
    
    // 오직 마스터된 카드만 5사이클 경과 시 점수를 4로 깎아서 액티브 덱으로 돌려보냄
    for (let i = masteredCards.length - 1; i >= 0; i--) {
      let mCard = masteredCards[i];
      if (mCard.tag === currentDeckTag && !mCard.isHidden && (currentCycle - mCard.masteredAtCycle >= 5)) {
        mCard.correctCount = 4;
        mCard.lastUpdatedCycle = currentCycle;
        activeCards.push(mCard);
        masteredCards.splice(i, 1);
      }
    }
    
    // 액티브 카드는 상태 초기화만 하고 점수는 절대 깎지 않음
    activeCards.forEach(c => {
      if (c.tag === currentDeckTag) {
        c.isCorrectInCurrentCycle = false; 
      }
    });

    let availableActive = activeCards.filter(c => !c.isHidden && c.tag === currentDeckTag);
    let availableMaster = masteredCards.filter(c => !c.isHidden && c.tag === currentDeckTag);

    // 덱이 텅 비었을 때 시간을 앞당겨서 학습할 카드를 끌어오는 로직
    if (availableActive.length === 0 && availableMaster.length > 0) {
      let minCycles = 5;
      availableMaster.forEach(f => {
        let left = 5 - (currentCycle - f.masteredAtCycle);
        if (left < minCycles) minCycles = left;
      });
      if (minCycles > 0 && minCycles <= 5) {
        deckCycles[currentDeckTag] += (minCycles - 1);
        alert(`💡 이 덱에 현재 학습할 카드가 없어서 시간을 ${minCycles}턴 앞당겼어!`);
        return resetDeck(); 
      }
    }

    shuffledDeck = shuffle([...availableActive]);
    currentIndex = 0;
    saveData();
  }

  function updateUI(keepFlipped = false) {
    document.getElementById('hint-toast').classList.remove('show'); 

    if (!keepFlipped) {
      card.classList.remove('flipped');
    }
    
    setTimeout(() => {
      const btnHint = document.getElementById('btn-hint');

      if (shuffledDeck.length === 0) {
        let totalCardsInDeck = activeCards.filter(c => c.tag === currentDeckTag).length + masteredCards.filter(c => c.tag === currentDeckTag).length;
        let totalHiddenInDeck = activeCards.filter(c => c.tag === currentDeckTag && c.isHidden).length + masteredCards.filter(c => c.tag === currentDeckTag && c.isHidden).length;
        
        if (totalCardsInDeck > 0 && totalHiddenInDeck === totalCardsInDeck) {
          frontDisplay.innerHTML = "텅~ 비었어!"; textDisplay.innerHTML = "이 덱의 모든 카드가 숨김 처리되어 있어!\n전체 목록에서 숨김을 해제해 봐.";
        } else if(totalCardsInDeck === 0) {
          frontDisplay.innerHTML = "텅~ 비었어!"; textDisplay.innerHTML = "이 덱에 새로운 문장을 추가해 봐!";
        } else {
          frontDisplay.innerHTML = "🏆 완벽해!"; textDisplay.innerHTML = "현재 덱의 모든 문장을 마스터했어!";
        }
        
        progressText.textContent = "0 / 0"; progressBarFill.style.width = "100%";
        btnCorrect.textContent = "✔ 정답 (0/5)";
        btnPrev.disabled = true; 
        btnCorrect.disabled = true; btnNext.disabled = true; btnHint.style.display = 'none';
        cardContainer.classList.remove('card-hidden-anim');
        return;
      }

      const currentCard = shuffledDeck[currentIndex];
      
      if (currentCard.type === 'cloze') {
          const parsedFront = formatText(currentCard.name, true);
          frontDisplay.innerHTML = parsedFront.formatted;
          
          let backContent = parsedFront.answers.length > 0 
            ? parsedFront.answers.map((a, i) => `${i+1}. ${a}`).join('\n') 
            : "정답 없음";
          
          if (currentCard.content) {
              backContent += `\n\n<span style="color:#7f8c8d; font-size:14px;">--- 추가 내용 ---\n</span>` + formatText(currentCard.content).formatted;
          }
          textDisplay.innerHTML = backContent;
      } else {
          frontDisplay.innerHTML = formatText(currentCard.name).formatted;
          textDisplay.innerHTML = formatText(currentCard.content).formatted;
      }

      btnHint.style.display = (currentCard.hint && currentCard.hint.trim() !== "") ? 'block' : 'none';

      if (currentCard.isHidden) {
        cardContainer.classList.add('card-hidden-anim');
        btnCorrect.disabled = true; 
        btnNext.disabled = false;
      } else {
        cardContainer.classList.remove('card-hidden-anim');
        if (keepFlipped || card.classList.contains('flipped') || currentCard.isCorrectInCurrentCycle) {
            btnCorrect.disabled = false;
        } else {
            btnCorrect.disabled = true; 
        }
        btnNext.disabled = false;
      }

      // 타입 상관없이 똑같이 점수 보여주기
      if (currentCard.isCorrectInCurrentCycle) {
        btnCorrect.textContent = `❌ 정답 취소 (${currentCard.correctCount}/5)`;
        btnCorrect.classList.add('btn-undo'); btnCorrect.classList.remove('btn-correct');
      } else {
        btnCorrect.textContent = `✔ 정답 (${currentCard.correctCount}/5)`;
        btnCorrect.classList.add('btn-correct'); btnCorrect.classList.remove('btn-undo');
        
        if (currentCard.type === 'cloze') {
            const unrevealed = document.querySelectorAll('#front-display .inline-cloze:not(.revealed)');
            if (unrevealed.length === 0) {
                btnCorrect.disabled = false;
            }
        }
      }
      
      const total = shuffledDeck.length;
      const currentNum = currentIndex + 1;
      progressText.textContent = `${currentNum} / ${total}`;
      progressBarFill.style.width = `${(currentNum / total) * 100}%`;

      btnPrev.disabled = (currentIndex === 0);

    }, 100);
  }

  function flipCard() {
    document.getElementById('hint-toast').classList.remove('show'); 
    
    let currentCard = shuffledDeck.length > 0 ? shuffledDeck[currentIndex] : null;
    if (!currentCard || currentCard.isHidden) return;

    let isCloze = currentCard.type === 'cloze';

    if (isCloze && !card.classList.contains('flipped')) {
      const unrevealed = document.querySelectorAll('#front-display .inline-cloze:not(.revealed)');
      if (unrevealed.length > 0) {
        unrevealed[0].classList.add('revealed'); 
        
        if (unrevealed.length === 1 && !currentCard.isCorrectInCurrentCycle) {
          btnCorrect.disabled = false;
        }
        return; 
      }
    }

    card.classList.toggle('flipped');
    
    if (card.classList.contains('flipped')) {
      if (!currentCard.isCorrectInCurrentCycle) btnCorrect.disabled = false;
    } else {
      if (!isCloze && !currentCard.isCorrectInCurrentCycle) {
        btnCorrect.disabled = true;
      }
    }
  }

  function markCorrect() {
    if (shuffledDeck.length === 0) return;
    let c = shuffledDeck[currentIndex];

    // 꼼수 방지 (같은 사이클에서 정답 여러 번 누르는 것 방지)
    if (c.isCorrectInCurrentCycle) { 
      c.isCorrectInCurrentCycle = false;
      c.correctCount -= 1;
      saveData(); updateUI(true); 
    } 
    else { 
      c.isCorrectInCurrentCycle = true;
      c.lastUpdatedCycle = deckCycles[currentDeckTag];
      c.correctCount += 1;

      let isMastered = c.correctCount >= 5;

      if (isMastered) {
        cardContainer.classList.add('fly-away');
        c.masteredAtCycle = deckCycles[currentDeckTag]; 
        
        setTimeout(() => {
          cardContainer.classList.remove('fly-away');
          if (!masteredCards.includes(c)) {
            activeCards = activeCards.filter(item => item !== c);
            masteredCards.push(c);
          }
          shuffledDeck.splice(currentIndex, 1);
          if (shuffledDeck.length === 0 || currentIndex >= shuffledDeck.length) resetDeck();
          saveData(); updateUI(); 
        }, 500);
      } else {
        currentIndex++;
        if (currentIndex >= shuffledDeck.length) resetDeck();
        saveData(); updateUI(); 
      }
    }
  }

  function prevCard() {
    if (shuffledDeck.length === 0 || currentIndex === 0) return;
    currentIndex--; saveData(); updateUI();
  }

  function nextCard() {
    if (shuffledDeck.length === 0) return;
    if (currentIndex === shuffledDeck.length - 1) resetDeck();
    else { currentIndex++; saveData(); }
    updateUI();
  }

  function openFormModal(mode, target = null) {
    currentMode = mode;
    currentEditTarget = target || (shuffledDeck.length > 0 ? shuffledDeck[currentIndex] : null);

    const modalTitle = document.getElementById('modal-title');
    const submitBtn = document.getElementById('modal-submit-btn');
    const deleteBtn = document.getElementById('modal-delete-btn');
    const nameInput = document.getElementById('new-name');
    const hintInput = document.getElementById('new-hint');
    const contentInput = document.getElementById('new-content');
    const hiddenCheckbox = document.getElementById('new-hidden');
    const tagInput = document.getElementById('new-tag');

    if (mode === 'edit' && currentEditTarget) {
      modalTitle.textContent = "✏️ 문장 편집하기";
      submitBtn.textContent = "저장하기"; deleteBtn.style.display = 'block';
      nameInput.value = currentEditTarget.name;
      hintInput.value = currentEditTarget.hint || "";
      contentInput.value = currentEditTarget.content;
      hiddenCheckbox.checked = currentEditTarget.isHidden || false;
      tagInput.value = currentEditTarget.tag || "";
    } else {
      modalTitle.textContent = "새 문장 추가하기";
      submitBtn.textContent = "추가하기"; deleteBtn.style.display = 'none';
      nameInput.value = ""; hintInput.value = ""; contentInput.value = "";
      hiddenCheckbox.checked = false;
      tagInput.value = currentDeckTag; 
    }
    document.getElementById('form-modal').style.display = 'flex';
  }

  function closeFormModal() { document.getElementById('form-modal').style.display = 'none'; }

  function submitCard() {
    const name = document.getElementById('new-name').value.trim();
    const hint = document.getElementById('new-hint').value.trim();
    const content = document.getElementById('new-content').value.trim();
    const tag = document.getElementById('new-tag').value.trim();
    const isHidden = document.getElementById('new-hidden').checked;

    if (name === "") { alert("문제를 입력해 줘!"); return; }

    const tempType = getCardType(name);
    if (tempType === 'normal' && content === "") {
       alert("일반 카드는 정답(뒷면)이 비어있으면 안 돼!\n스마트 빈칸을 쓰려면 텍스트에 [[ ]] 를 추가해 줘.");
       return;
    }

    if (currentMode === 'edit' && currentEditTarget) {
      const oldTag = currentEditTarget.tag;
      currentEditTarget.name = name;
      currentEditTarget.hint = hint;
      currentEditTarget.content = content;
      currentEditTarget.isHidden = isHidden;
      currentEditTarget.tag = tag;
      upgradeCardData(currentEditTarget); 
      
      if (isHidden || oldTag !== tag) {
        const idx = shuffledDeck.indexOf(currentEditTarget);
        if (idx > -1) {
          shuffledDeck.splice(idx, 1);
          if (currentIndex >= shuffledDeck.length && shuffledDeck.length > 0) currentIndex--;
          if (shuffledDeck.length === 0) resetDeck();
        }
      }
    } else {
      let newCard = upgradeCardData({ name: name, content: content, hint: hint, isHidden: isHidden, tag: tag });
      activeCards.push(newCard);
      if (!isHidden && tag === currentDeckTag) {
        if (shuffledDeck.length === 0) resetDeck(); else shuffledDeck.push(newCard);
      }
    }
    
    getAvailableDecks(); 
    saveData(); closeFormModal(); updateUI();
    if (document.getElementById('all-list-modal').style.display === 'flex') filterAllList();
    if (document.getElementById('mastered-modal').style.display === 'flex') openMasteredModal();
    if (document.getElementById('view-modal').style.display === 'flex') viewAnyCard(currentEditTarget);
  }

  function deleteCard() {
    if (!confirm("정말 이 카드를 삭제할까? 한 번 지우면 복구할 수 없어!")) return;
    if (currentEditTarget) {
      activeCards = activeCards.filter(c => c !== currentEditTarget);
      masteredCards = masteredCards.filter(c => c !== currentEditTarget);
      const deckIdx = shuffledDeck.indexOf(currentEditTarget);
      if (deckIdx > -1) {
        shuffledDeck.splice(deckIdx, 1);
        if (deckIdx === currentIndex && currentIndex >= shuffledDeck.length) resetDeck();
        else if (deckIdx < currentIndex) currentIndex--;
      }
    }
    
    getAvailableDecks();
    if (shuffledDeck.length === 0 && activeCards.filter(c => !c.isHidden && c.tag === currentDeckTag).length > 0) resetDeck();
    saveData(); closeFormModal(); updateUI();
    if (document.getElementById('all-list-modal').style.display === 'flex') filterAllList();
    if (document.getElementById('mastered-modal').style.display === 'flex') openMasteredModal();
    closeViewModal();
  }

  function openDeckModal() {
    const listContainer = document.getElementById('deck-list');
    listContainer.innerHTML = '';
    
    let currentDecks = getAvailableDecks();
    
    currentDecks.forEach((tag, index) => {
        let activeCount = activeCards.filter(c => (c.tag || "") === tag && !c.isHidden).length;
        let masterCount = masteredCards.filter(c => (c.tag || "") === tag && !c.isHidden).length;
        
        const item = document.createElement('div');
        item.className = 'mastered-item'; 
        if(tag === currentDeckTag) item.style.backgroundColor = '#d1f2eb';
        
        let tagName = tag === "" ? "기본" : tag;
        
        item.innerHTML = `
          <div style="flex:1;" onclick="switchDeck('${tag}'); closeDeckModal();">
            <span>📂 <b>${tagName}</b></span> 
            <span style="font-size:12px; font-weight:normal; color:#7f8c8d; margin-left: 5px;">진행 ${activeCount} / 마스터 ${masterCount}</span>
          </div>
          <div class="deck-order-btns">
            <button class="btn-order" onclick="moveDeckUp('${tag}', event)">▲</button>
            <button class="btn-order" onclick="moveDeckDown('${tag}', event)">▼</button>
          </div>
        `;
        
        let btnUp = item.querySelector('.deck-order-btns button:first-child');
        let btnDown = item.querySelector('.deck-order-btns button:last-child');
        if (index === 0) btnUp.style.visibility = 'hidden';
        if (index === currentDecks.length - 1) btnDown.style.visibility = 'hidden';

        listContainer.appendChild(item);
    });
    
    document.getElementById('deck-modal').style.display = 'flex';
  }
  function closeDeckModal() { document.getElementById('deck-modal').style.display = 'none'; }


  function openMasteredModal() {
    const listContainer = document.getElementById('mastered-list');
    listContainer.innerHTML = '';
    
    let currentMastered = masteredCards.filter(c => c.tag === currentDeckTag);
    let currentCycle = deckCycles[currentDeckTag] || 0;

    if (currentMastered.length === 0) {
      listContainer.innerHTML = '<p style="text-align:center; color:#7f8c8d; margin-top:20px;">현재 덱에 마스터한 문장이 없어.</p>';
    } else {
      const sortedMastered = [...currentMastered].sort((a, b) => a.name.localeCompare(b.name));
      sortedMastered.forEach((f) => {
        const item = document.createElement('div');
        item.className = 'mastered-item'; item.onclick = () => viewAnyCard(f);
        const cyclesLeft = 5 - (currentCycle - f.masteredAtCycle);
        const hiddenTag = f.isHidden ? `<span style="background:#bdc3c7; color:white; font-size:10px; padding:2px 5px; border-radius:4px; margin-left:5px;">숨김</span>` : "";
        const textStyle = f.isHidden ? "color:#bdc3c7; text-decoration:line-through;" : "";
        item.innerHTML = `<span><span style="${textStyle}">${f.name.substring(0, 15)}...</span>${hiddenTag}</span> <span style="font-size:12px; font-weight:normal;">복습까지 ${cyclesLeft}턴 남음</span>`;
        listContainer.appendChild(item);
      });
    }
    document.getElementById('mastered-modal').style.display = 'flex';
  }
  function closeMasteredModal() { document.getElementById('mastered-modal').style.display = 'none'; }

  function openAllListModal() {
    document.getElementById('search-input').value = '';
    renderAllList();
    document.getElementById('all-list-modal').style.display = 'flex';
  }

  function closeAllListModal() { document.getElementById('all-list-modal').style.display = 'none'; }

  function filterAllList() {
    const query = document.getElementById('search-input').value;
    renderAllList(query);
  }

  function renderAllList(searchQuery = "") {
    const listContainer = document.getElementById('all-list');
    listContainer.innerHTML = '';
    
    let allCards = [...activeCards, ...masteredCards];
    allCards.sort((a, b) => a.name.localeCompare(b.name));

    document.getElementById('all-count').textContent = allCards.length;

    if (searchQuery.trim() !== "") {
      const lowerQuery = searchQuery.toLowerCase();
      allCards = allCards.filter(card => 
        card.name.toLowerCase().includes(lowerQuery) || 
        (card.content && card.content.toLowerCase().includes(lowerQuery)) ||
        (card.tag && card.tag.toLowerCase().includes(lowerQuery))
      );
    }
    
    if (allCards.length === 0) {
      listContainer.innerHTML = '<p style="text-align:center; color:#7f8c8d; margin-top:20px;">등록된 카드가 없거나 검색 결과가 없어!</p>';
    } else {
      allCards.forEach(f => {
        const item = document.createElement('div');
        item.className = 'mastered-item'; item.onclick = () => viewAnyCard(f);
        
        let statusText = masteredCards.includes(f) ? "🏆 마스터" : `💪 학습중 (${f.correctCount}/5)`;

        const hiddenTag = f.isHidden ? `<span style="background:#bdc3c7; color:white; font-size:10px; padding:2px 5px; border-radius:4px; margin-left:5px;">숨김</span>` : "";
        const deckBadge = f.tag ? `<span style="background:#8e44ad; color:white; font-size:10px; padding:2px 5px; border-radius:4px; margin-right:5px;">${f.tag}</span>` : `<span style="background:#95a5a6; color:white; font-size:10px; padding:2px 5px; border-radius:4px; margin-right:5px;">기본</span>`;
        const textStyle = f.isHidden ? "color:#bdc3c7; text-decoration:line-through;" : "";
        item.innerHTML = `<span style="display:flex; align-items:center;">${deckBadge}<span style="${textStyle}">${f.name.substring(0, 15)}...</span>${hiddenTag}</span> <span style="font-size:12px; font-weight:normal; color:#7f8c8d;">${statusText}</span>`;
        listContainer.appendChild(item);
      });
    }
  }

  function viewAnyCard(cardObj) {
    currentViewTarget = cardObj;
    document.getElementById('view-name').innerHTML = formatText(cardObj.name).formatted;
    document.getElementById('view-content').innerHTML = formatText(cardObj.content || "없음").formatted;
    
    const viewHint = document.getElementById('view-hint');
    if (cardObj.hint && cardObj.hint.trim() !== "") {
      viewHint.innerText = "💡 힌트: " + cardObj.hint; viewHint.style.display = 'block';
    } else viewHint.style.display = 'none';
    
    const viewHideBtn = document.getElementById('view-btn-hide');
    if (cardObj.isHidden) {
      viewHideBtn.textContent = "👀 숨김 해제"; viewHideBtn.style.color = "#e74c3c"; viewHideBtn.style.borderColor = "#e74c3c"; viewHideBtn.style.backgroundColor = "#fdf2f1";
    } else {
      viewHideBtn.textContent = "🫥 숨김"; viewHideBtn.style.color = "#7f8c8d"; viewHideBtn.style.borderColor = "#bdc3c7"; viewHideBtn.style.backgroundColor = "white";
    }
    document.getElementById('view-modal').style.display = 'flex';
  }

  function toggleHideViewed() {
    if(!currentViewTarget) return;
    currentViewTarget.isHidden = !currentViewTarget.isHidden;
    saveData();
    
    const viewHideBtn = document.getElementById('view-btn-hide');
    if (currentViewTarget.isHidden) {
      viewHideBtn.textContent = "👀 숨김 해제"; viewHideBtn.style.color = "#e74c3c"; viewHideBtn.style.borderColor = "#e74c3c"; viewHideBtn.style.backgroundColor = "#fdf2f1";
      const idx = shuffledDeck.indexOf(currentViewTarget);
      if (idx > -1) {
          shuffledDeck.splice(idx, 1);
          if (currentIndex >= shuffledDeck.length && shuffledDeck.length > 0) currentIndex--;
      }
    } else {
      viewHideBtn.textContent = "🫥 숨김"; viewHideBtn.style.color = "#7f8c8d"; viewHideBtn.style.borderColor = "#bdc3c7"; viewHideBtn.style.backgroundColor = "white";
      if (!currentViewTarget.isHidden && currentViewTarget.tag === currentDeckTag) {
          if (shuffledDeck.length === 0) resetDeck();
          else if (!shuffledDeck.includes(currentViewTarget) && !masteredCards.includes(currentViewTarget)) {
              shuffledDeck.push(currentViewTarget);
          }
      }
    }

    if (shuffledDeck.length > 0 && shuffledDeck[currentIndex] === currentViewTarget) updateUI(card.classList.contains('flipped'));
    else updateUI();
    
    if (document.getElementById('all-list-modal').style.display === 'flex') filterAllList();
    if (document.getElementById('mastered-modal').style.display === 'flex') openMasteredModal();
  }
  function closeViewModal() { document.getElementById('view-modal').style.display = 'none'; }
  function editViewedCard() { openFormModal('edit', currentViewTarget); }

  loadSavedData();
  if (shuffledDeck.length === 0) resetDeck();
  updateUI();
</script>
</body>
</html>
